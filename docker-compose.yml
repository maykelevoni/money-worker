# Deploy the app. One web container; DB is Neon and media is R2 (both external).
# All settings/keys live in a single .env file next to this one.
#
#   cp .env.example .env    # fill it in (Neon DATABASE_URL, R2_*, API keys)
#   docker compose up -d --build
#   docker compose logs -f web
#   docker compose down
#
# On Hostinger: put the .env file in the project folder (File Manager or SSH),
# then deploy. Entrypoint runs migrations, gunicorn serves on :8000.

services:
  web:
    build: .
    image: money-worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      # Confirm gunicorn is accepting connections (a full HTTP request would hit
      # Django's ALLOWED_HOSTS check and 400 on the 127.0.0.1 Host header).
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 5).close()"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 40s
