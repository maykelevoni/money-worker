# Local, self-contained stack. `docker compose up` builds the app image and
# runs it against a bundled Postgres with persistent media — no Neon or R2
# needed. Production deploys the *same* Dockerfile on Coolify against Neon + R2;
# this file is for running the whole thing on your machine.
#
#   docker compose up --build            # start (Ctrl-C to stop)
#   docker compose exec web python manage.py createsuperuser   # first login
#   open http://localhost:8000/
#   docker compose down                  # stop (add -v to wipe the DB + media)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moneyworker
      POSTGRES_PASSWORD: moneyworker
      POSTGRES_DB: moneyworker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyworker -d moneyworker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    # API keys (OpenRouter, FAL, Resend, …) come from your .env. The vars set
    # below override .env so the container talks to the bundled Postgres and
    # runs in dev mode (plain-HTTP cookies, permissive hosts).
    env_file:
      - .env
    environment:
      # sslmode=disable: the local Postgres container speaks plain TCP.
      DATABASE_URL: postgresql://moneyworker:moneyworker@db:5432/moneyworker?sslmode=disable
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media          # generated images/video/audio persist across restarts
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
