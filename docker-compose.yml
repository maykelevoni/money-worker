# Deploy on Hostinger's Docker Manager (it git-clones this repo and builds the
# Dockerfile — confirmed from the deploy log).
#
# The clone does NOT include .env (it's gitignored), so every secret comes from
# the panel's "Environment variables" section — the ${VAR} refs below read them.
# You MUST set at least SECRET_KEY, ALLOWED_HOSTS and DATABASE_URL, or the app
# 400s on every request / falls back to throwaway SQLite.
#
# DB is Neon and media is R2 (both external), so app state is external.
#
# Two containers:
#   web   — gunicorn on :8000, NOT published to the host (internal only)
#   caddy — public front door on :80/:443, auto-provisions a Let's Encrypt cert
#           and reverse-proxies to web:8000. Point your domain's A record at the
#           VPS IP; Caddy needs :80 reachable to validate the cert.
# Panel env for TLS: SITE_HOST=yourdomain.com  ACME_EMAIL=you@example.com
# (also set DEBUG=False, ALLOWED_HOSTS, CSRF_TRUSTED_ORIGINS=https://yourdomain.com)

services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"          # internal only — reached by Caddy as web:8000
    environment:
      # --- Django core (REQUIRED for a working deploy) ---
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}          # e.g. yourdomain.com  (blank -> 400 on every request)
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SITE_HOST: ${SITE_HOST}
      APP_BASE_URL: ${APP_BASE_URL}
      # --- Database (Neon) — REQUIRED, else it uses throwaway SQLite ---
      DATABASE_URL: ${DATABASE_URL}
      # --- AI / content (FAL key also drives F5-TTS voice) ---
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-opus-4-8}
      FAL_API_KEY: ${FAL_API_KEY}
      # --- Email + publishing ---
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      UPLOAD_POST_API_KEY: ${UPLOAD_POST_API_KEY}
      UPLOAD_POST_USER: ${UPLOAD_POST_USER}
      # --- Media storage (Cloudflare R2) ---
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 5).close()"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 40s

  # Reverse proxy + automatic HTTPS. The Caddyfile is baked into the image
  # (Caddyfile.Dockerfile) rather than bind-mounted — Hostinger's Docker Manager
  # runs compose from a dir without the repo files, so a mount would fail.
  # Certs live in the caddy_data volume so they survive redeploys.
  caddy:
    build:
      context: .
      dockerfile: Caddyfile.Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOST: ${SITE_HOST}       # apex domain, e.g. getpostforge.cloud — cert issued for this + www
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
