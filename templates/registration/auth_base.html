<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PostForge{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ff7e2e'/%3E%3Cpath d='M11 23V9h7.2c2.7 0 4.4 1.7 4.4 4.2S20.9 17.5 18.2 17.5H14.4V23z M14.4 14.6h3.3c1 0 1.7-.6 1.7-1.4s-.7-1.4-1.7-1.4h-3.3z' fill='%231a1206'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#0b0d11; --ink-2:#0e1116; --surface:#14181f; --surface-2:#1b202a;
      --line:#252b36; --text:#e9ecf2; --muted:#868e9e; --faint:#5b6273;
      --beak:#ff7e2e; --beak-2:#ff9a55; --beak-soft:rgba(255,126,46,.13); --loot:#f4c04e;
      --eyes:#ff4d4d; --ok:#43d6a0;
      --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
      --sans:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { min-height:100%; }
    body { background:var(--ink); color:var(--text); font-family:var(--sans);
      font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
      display:flex; align-items:center; justify-content:center; padding:24px;
      background-image:
        radial-gradient(60% 55% at 50% -8%, rgba(255,126,46,.16), transparent 70%),
        radial-gradient(45% 40% at 92% 108%, rgba(244,192,78,.08), transparent 70%);
    }
    .wrap { width:100%; max-width:400px; }
    .brand { display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:26px; }
    .brand svg { flex:none; }
    .brand .word { font-size:26px; font-weight:900; letter-spacing:-.6px; }
    .brand .word b { color:var(--beak); }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:16px;
      padding:30px 28px 28px; box-shadow:0 24px 70px rgba(0,0,0,.45); }
    .card h1 { font-size:21px; font-weight:800; letter-spacing:-.3px; text-align:center; }
    .card .sub { color:var(--muted); font-size:14px; text-align:center; margin-top:7px; margin-bottom:22px; }
    label { display:block; font-size:12.5px; color:var(--muted); margin:14px 0 6px; font-weight:500; }
    input { width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text);
      border-radius:10px; padding:11px 13px; font-size:14.5px; font-family:var(--sans); }
    input:focus { outline:none; border-color:var(--beak); box-shadow:0 0 0 3px var(--beak-soft); }
    .btn { width:100%; margin-top:22px; background:var(--beak); color:#1a1206; border:none;
      padding:12px 16px; border-radius:10px; font-family:var(--sans); font-size:14.5px;
      font-weight:800; cursor:pointer; transition:filter .12s, transform .04s; }
    .btn:hover { filter:brightness(1.08); }
    .btn:active { transform:translateY(1px); }
    .hint { font-size:11.5px; color:var(--faint); margin-top:5px; }
    .err { background:rgba(255,77,77,.09); color:#ff8a8a; border:1px solid rgba(255,77,77,.28);
      border-radius:10px; padding:11px 13px; font-size:13px; margin-bottom:6px; }
    .errs { margin-bottom:14px; display:grid; gap:8px; }
    .note { background:rgba(67,214,160,.08); color:var(--ok); border:1px solid rgba(67,214,160,.25);
      border-radius:10px; padding:12px 14px; font-size:13.5px; }
    .foot { text-align:center; color:var(--faint); font-size:12.5px; margin-top:20px; }
    .foot a { color:var(--beak-2); text-decoration:none; font-weight:600; }
    .foot a:hover { filter:brightness(1.1); }
    @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg viewBox="0 0 32 32" width="30" height="30" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#g)"/>
        <path d="M11 23V9h7.2c2.7 0 4.4 1.7 4.4 4.2S20.9 17.5 18.2 17.5H14.4V23z M14.4 14.6h3.3c1 0 1.7-.6 1.7-1.4s-.7-1.4-1.7-1.4h-3.3z" fill="#1a1206"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop stop-color="#ff9a55"/><stop offset="1" stop-color="#ff7e2e"/></linearGradient></defs>
      </svg>
      <span class="word">Post<b>Forge</b></span>
    </div>

    <div class="card">
      {% block card %}{% endblock %}
    </div>

    {% block foot %}{% endblock %}
  </div>
</body>
</html>
