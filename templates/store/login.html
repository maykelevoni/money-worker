{% extends "store/_base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div class="card center">
  <h1>Sign in</h1>
  <p class="muted">Use the email you bought with and your password.</p>
  <form method="post" action="{% url 'store:login' %}">
    {% csrf_token %}
    <input type="email" name="email" placeholder="you@email.com" required autofocus>
    <input type="password" name="password" placeholder="Password" required>
    <button class="btn" type="submit" style="width:100%">Sign in</button>
  </form>
  <p class="muted" style="margin-top:14px;font-size:14px">
    <a href="{% url 'store:forgot_password' %}">Forgot password?</a>
  </p>
</div>
{% endblock %}
