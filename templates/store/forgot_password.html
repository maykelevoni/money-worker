{% extends "store/_base.html" %}
{% block title %}Forgot password{% endblock %}
{% block body %}
<div class="card center">
  <h1>Reset your password</h1>
  <p class="muted">Enter your email and we'll send a link to set a new password.</p>
  <form method="post" action="{% url 'store:forgot_password' %}">
    {% csrf_token %}
    <input type="email" name="email" placeholder="you@email.com" required autofocus>
    <button class="btn" type="submit" style="width:100%">Send reset link</button>
  </form>
  <p class="muted" style="margin-top:14px;font-size:14px"><a href="{% url 'store:login' %}">Back to sign in</a></p>
</div>
{% endblock %}
