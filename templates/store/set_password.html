{% extends "store/_base.html" %}
{% block title %}Set your password{% endblock %}
{% block body %}
<div class="card center">
  <h1>Payment complete</h1>
  <p class="muted">Create a password to open your product. You'll sign in with this next time.</p>
  <form method="post" action="{% url 'store:set_password' %}">
    {% csrf_token %}
    <input type="hidden" name="session_id" value="{{ session_id }}">
    <input type="email" value="{{ email }}" readonly>
    <input type="password" name="password" placeholder="Choose a password (8+ characters)" required minlength="8" autofocus>
    <button class="btn" type="submit" style="width:100%">Create account &amp; open product</button>
  </form>
</div>
{% endblock %}
