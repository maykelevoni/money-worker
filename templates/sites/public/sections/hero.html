<section class="sec-hero">
  <div class="wrap">
    <h1>{{ s.data.headline }}</h1>
    {% if s.data.subtext %}<p class="lead">{{ s.data.subtext }}</p>{% endif %}
    {% if s.data.button_text %}<a class="btn-lg" href="{{ s.data.button_url|default:'#' }}">{{ s.data.button_text }}</a>{% endif %}
    {% if s.image %}<img class="hero-img" src="{{ s.image.url }}" alt="">{% endif %}
  </div>
</section>
