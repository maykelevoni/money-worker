<section class="section band sec-quote">
  <div class="wrap">
    <div class="quote-card">
      <div class="mark" aria-hidden="true">“</div>
      <div class="stars" aria-hidden="true">★★★★★</div>
      <blockquote>{{ s.data.quote }}</blockquote>
      <div class="who"><b>{{ s.data.author }}</b>{% if s.data.role %} · {{ s.data.role }}{% endif %}</div>
    </div>
  </div>
</section>
