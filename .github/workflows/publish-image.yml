# Build the app image on every push to main and publish it to GitHub Container
# Registry (GHCR). Hostinger's Docker Manager then just *pulls* this image —
# it never has to build, which is why the compose-from-URL deploy failed before.
name: Publish image

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual rebuilds from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # lets GITHUB_TOKEN push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # ghcr.io/maykelevoni/money-worker
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
